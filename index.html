<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COD: Tactical Encyclopedia v5.0</title>
    <style>
        :root { --p: #ff4500; --a: #6200ea; --bg: #050505; --s: #00f2ea; --c: #aaa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: url('https://ts1.cn.mm.bing.net/th/id/OIP-C.QiLv6lSwgzVHVfKCTnqFfAHaEo?pid=ImgDet&rs=1') center/cover; opacity: 0.2; z-index: -1; filter: blur(8px); }
        
        /* 导航与搜索 */
        .nav { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
        .btn { padding: 8px 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,69,0,0.3); border-radius: 4px; color: #fff; text-decoration: none; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .btn:hover { background: var(--p); transform: translateY(-2px); box-shadow: 0 0 15px var(--p); }
        header { padding: 100px 20px 40px; text-align: center; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); letter-spacing: 12px; margin: 0; text-transform: uppercase; filter: drop-shadow(0 0 10px var(--p)); }
        #sch { width: 400px; max-width: 80%; padding: 15px 25px; margin: 20px auto; display: block; border-radius: 30px; border: 1px solid #333; background: rgba(0,0,0,0.8); color: #fff; outline: none; transition: 0.4s; }

        /* 列表卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .card { height: 380px; background: #111 center/cover; border-radius: 15px; cursor: pointer; position: relative; overflow: hidden; border: 1px solid #222; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); display: flex; align-items: flex-end; padding: 20px; }
        .card:hover { transform: translateY(-10px); border-color: var(--p); box-shadow: 0 20px 40px -10px var(--p); }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, #000 15%, transparent 60%); z-index: 1; }
        .card b { position: relative; z-index: 2; font-size: 20px; }

        /* 模态框 & 武器对比 */
        .mdl { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .mdl.active { display: flex; }
        .mdl-c { background: #0a0a0a; border: 1px solid #333; width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 20px; overflow-y: auto; position: relative; display: grid; grid-template-columns: 1.2fr 1fr; }
        @media (max-width: 850px) { .mdl-c { grid-template-columns: 1fr; } }
        
        .det { padding: 30px; border-right: 1px solid #222; }
        .vid { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        
        /* 武器对比 UI */
        .wpn-box { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .wpn-tag { background: #1a1a1a; border: 1px solid #333; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; color: var(--s); }
        .wpn-tag:hover { border-color: var(--p); background: #222; }
        .stat-panel { background: #111; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid var(--p); }
        .stat-line { margin: 8px 0; }
        .stat-label { font-size: 11px; color: #888; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--p); width: 0; transition: 0.6s; }

        /* 抖音/TikTok 聊骚区 */
        .soc { padding: 30px; display: flex; flex-direction: column; background: #080808; }
        .lst { flex: 1; max-height: 450px; overflow-y: auto; }
        .c-it { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 13px; position: relative; }
        .c-it u { color: var(--s); text-decoration: none; font-weight: bold; }
        .source-tag { font-size: 10px; background: #ff0050; color: #fff; padding: 2px 5px; border-radius: 3px; margin-left: 8px; cursor: pointer; text-decoration: none; }
        .tk-tag { background: #00f2ea; color: #000; }
        
        .cfg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #111; padding: 15px; border-radius: 10px; border-left: 4px solid var(--p); font-size: 12px; }
        .cls { position: absolute; right: 20px; top: 15px; font-size: 30px; color: #555; cursor: pointer; z-index: 10; }
    </style>
</head>

    {id:"c21", n:"黑色行动 6", g:"2024年 / 谍战", s:"2024年10月25日发售。全向移动之王，海湾战争背景。", cpu:"i5-6600", gpu:"GTX 960", ram:"12G", os:"Win11", img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.Qfx_fqqx8Lz-ZXRODr1iPgHaEK?w=280&h=180&c=7&r=0&o=7&pid=1.7&rm=3", bv:"BV1pE421N7q9", stm:"2933620", wpns:[{n:"XM4", dmg:75, fire:82, mob:75, rec:40},{n:"Jackal PDW", dmg:72, fire:92, mob:96, rec:48}]},
    {id:"c22", n:" 黑色行动7", g:"2026年 / 未来", s:"虚构续作。模拟2026年最新技术，高科技战场回归。", cpu:"i7-12700", gpu:"RTX 3060", ram:"16G", os:"Win11", img:"https://tse2-mm.cn.bing.net/th/id/OIP-C.YYhPfyUmalFUWse0D4mExQHaEJ?w=279&h=180&c=7&r=0&o=7&pid=1.7&rm=3", bv:"BV18E411a7mS", stm:"3000000", wpns:[{n:"死妈双持", dmg:80, fire:90, mob:80, rec:5},{n:"死妈秋田", dmg:100, fire:5, mob:30, rec:100}]}
];





    const $ = id => document.getElementById(id);
    let curObj = null;

    // 初始化 400 条接入抖音/TikTok 风格的去重评论
    const initComs = (id) => {
        let key = 'com_v5_' + id;
        if (!localStorage.getItem(key)) {
            let fake = [];
            const sources = ["抖音", "TikTok", "B站"];
            const users = ["Ghost_Riley", "Soap_MacTavish", "Price_Captain", "Mason_BO", "Woods_1984", "Makarov_InnerCircle"];
            const texts = ["这代手感绝了", "全向移动yyds", "141集合！", "为了肥皂", "求这代的优化补丁", "画面太真实了", "最阴的一代", "黑六必入"];
            
            for (let i=0; i<400; i++) {
                const src = sources[i % sources.length];
                fake.push({
                    u: users[Math.floor(Math.random()*users.length)] + "_" + (i+1000),
                    t: texts[Math.floor(Math.random()*texts.length)] + (i%10==0?" 🔥":""),
                    s: src,
                    l: src === "抖音" ? "https://v.douyin.com/6yMcDAhbTk4/" : (src === "TikTok" ? "https://www.tiktok.com/" : "https://www.bilibili.com/"),
                    d: "2026-03-" + (Math.floor(Math.random()*25)+1)
                });
            }
            localStorage.setItem(key, JSON.stringify(fake));
        }
    }

    const draw = (data) => {
        $('box').innerHTML = data.map(g => `<div class="card" style="background-image:url(${g.img})" onclick='op(${JSON.stringify(g).replace(/'/g, "&apos;")})'><b>${g.n}</b></div>`).join('');
    }

    // 武器对比核心逻辑
    const showWpnStat = (w) => {
        $('statPanel').style.display = 'block';
        $('wpnName').innerText = w.n;
        const stats = [
            {l:"杀伤力 (DMG)", v:w.dmg},
            {l:"射速 (FIRE)", v:w.fire},
            {l:"机动性 (MOB)", v:w.mob},
            {l:"控制力 (REC)", v:w.rec}
        ];
        $('statContent').innerHTML = stats.map(s => `
            <div class="stat-line">
                <div class="stat-label"><span>${s.l}</span><span>${s.v}%</span></div>
                <div class="stat-bar"><div class="stat-fill" style="width:${s.v}%"></div></div>
            </div>
        `).join('');
    }

    const op = (g) => {
    curObj = g;
    initComs(g.id);
    $('mT').innerText = g.n;
    $('mS').innerText = g.s;
    $('vA').innerHTML = `<iframe src="//player.bilibili.com/player.html?bvid=${g.bv}&page=1" scrolling="no" border="0" frameborder="no" style="width:100%;height:100%"></iframe>`;
    $('wpnList').innerHTML = g.wpns.map(w => `<div class="wpn-tag" onclick='showWpnStat(${JSON.stringify(w)})'>${w.n}</div>`).join('');
    $('statPanel').style.display = 'none';
    $('cL').innerHTML = `<div><i>处理器</i><b>${g.cpu}</b></div><div><i>显卡</i><b>${g.gpu}</b></div><div><i>内存</i><b>${g.ram}</b></div><div><i>系统</i><b>${g.os}</b></div>`;
    
    // 已修复跳转逻辑，并保留了玩家社区和获取资源
    $('links').innerHTML = `
        <a href="https://store.steampowered.com/search?term=call+of+duty">Steam 商店</a >
        <a href="https://tieba.baidu.com/f?kw=%25E4%25BD%25BF%25E5%2591%25BD%25E5%258F%25AC%25E5%2594%25A4" target="_blank" class="btn" style="border-color: #ff9d00;">玩家社区</a >
        <a href="https://byrut.org" target="_blank" class="btn" style="border-color:var(--a)">获取资源</a >
    `;
    
    $('mdl').classList.add('active');
    document.body.style.overflow = 'hidden';
    drawCom();
}



    const cls = () => { $('mdl').classList.remove('active'); document.body.style.overflow = ''; }

    const drawCom = () => {
        const cArr = JSON.parse(localStorage.getItem('com_v5_' + curObj.id) || '[]');
        $('cList').innerHTML = cArr.map(c => `
            <div class="c-it">
                <u>@${c.u}</u> 
                <a href="${c.l}" target="_blank" class="source-tag ${c.s==='TikTok'?'tk-tag':''}">${c.s} 来源</a >
                <p>${c.t}</p >
                <s style="color:#444; font-size:10px; text-decoration:none">${c.d} 战报</s>
            </div>
        `).reverse().join('');
    }

    window.pub = () => {
        const txt = $('ci').value; if(!txt) return;
        let cArr = JSON.parse(localStorage.getItem('com_v5_' + curObj.id) || '[]');
        cArr.push({ u: "指挥官_" + Math.random().toString(36).slice(-3), t: txt, s: "本地", l: "#", d: "刚刚" });
        localStorage.setItem('com_v5_' + curObj.id, JSON.stringify(cArr));
        $('ci').value = ""; drawCom();
    }

    // 搜索劫持逻辑
    $('sch').oninput = e => {
        const val = e.target.value;
        if (val.includes("片")) { window.location.href = "https://www."; return; }
        draw(db.filter(g => g.n.includes(val)));
    };

    draw(db);
</script>
